<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/menuwela-mini-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Outfit is the marketing landing's typeface — rounded geometric sans
      that pairs with the MenuWela wordmark (the "menu / wela" logo uses
      a custom rounded sans, Outfit shares the same friendly geometry).
      DM Serif Display is kept for the rare serif emphasis bits.
      Cormorant Garamond + Playfair Display power the "luxe" menu
      variant (Portal → Storefront → Menu-layout). All loaded with
      display=swap so the storefront still renders before the font
      arrives — classic + compact don't need either.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display&family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>MenuWela — Restaurant Ordering Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
